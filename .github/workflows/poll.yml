name: poll-japan-results

# 日本戦の時間帯だけ /api/poll を叩いて、終了した試合のスコアを自動反映する。
# cron は UTC。無料枠を食わないよう、試合の窓だけに絞っている。
# 決勝トーナメントの日程が決まったら、その窓をここに追記する。
on:
  schedule:
    # --- スコア反映用（試合の時間帯だけ10分おき）---
    # 第1戦 vs オランダ（6/15 5:00 JST = 6/14 20:00 UTC）
    - cron: '*/10 20-23 14 6 *'
    # 第2戦 vs チュニジア（6/21 13:00 JST = 6/21 04:00 UTC）
    - cron: '*/10 4-7 21 6 *'
    # 第3戦 vs スウェーデン（6/26 8:00 JST = 6/25 23:00 UTC）
    - cron: '*/10 23 25 6 *'
    - cron: '*/10 0-2 26 6 *'
    # --- 24時間前リマインド用＆スコアの保険（3時間おき・全試合をカバー）---
    - cron: '0 */3 * * *'
  workflow_dispatch: {} # 手動でも実行できる（テスト用）

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/poll
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          curl -s -m 30 "https://kminitodoke.vercel.app/api/poll?key=${ADMIN_SECRET}" -w '\n[%{http_code}]\n' || true
